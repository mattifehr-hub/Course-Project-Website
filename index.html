<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- resets browser defaults -->
    <link rel="stylesheet" type="text/css" href="css/normalize.css" />
    <!-- Custom Styles -->
    <link rel="stylesheet" type="text/css" href="css/book.css" />
    <!-- Google Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barriecito&family=Playpen+Sans:wght@100..800&display=swap" rel="stylesheet">

    <!-- <a href="openingPage.html" class="button">Next Page</a> -->


    <!-- Book -->
    <div id="book" class="book">
        <!-- Paper 1 -->
        <div id="p1" class="paper">
            <div class="front">
                <div id="f1" class="front-content">
                     <img src="images/cover.png" draggable="false" alt=""/>

                </div>
            </div>
            <div class="back">
                <div id="b1" class="back-content">
                    <p>Hi, Im here to take you on an adventure! Follow me through this floating door.</p>
                    <img src="images/page1.png" draggable="false" alt=""/>

                </div>
            </div>
        </div>
        <!-- Paper 2 -->
        <div id="p2" class="paper">
            <div class="front">
                <div id="f2" class="front-content">
                    <img src="images/page2.png" draggable="false" alt=""/>
                </div>
            </div>
        </div>
    </div>

    <!-- Next Button -->
    <button id="next-btn"></button>
    <a id="zoom-btn" href="location.html" style="display: none;"></a>
